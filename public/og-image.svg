<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F0C040"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Kente pattern -->
  <pattern id="kente" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="40" y2="40" stroke="#D4A017" stroke-width="0.5" opacity="0.08"/>
    <line x1="40" y1="0" x2="0" y2="40" stroke="#2E7D32" stroke-width="0.5" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#kente)"/>

  <!-- Gold accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)"/>

  <!-- Logo / Title -->
  <text x="80" y="160" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="12" fill="white">YOU</text>
  <text x="80" y="260" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="12" fill="url(#gold)">VOTE</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="28" fill="#9CA3AF">Vote. Gagne. Encaisse.</text>

  <!-- Divider -->
  <rect x="80" y="360" width="120" height="3" fill="url(#gold)"/>

  <!-- Description -->
  <text x="80" y="410" font-family="Arial, sans-serif" font-size="22" fill="#D1D5DB">Application football — Bénin · Afrique de l'Ouest</text>
  <text x="80" y="445" font-family="Arial, sans-serif" font-size="20" fill="#6B7280">Votez pour votre club · Gagnez des points · Retirez en FCFA</text>

  <!-- Download badge -->
  <rect x="80" y="490" width="260" height="60" rx="8" fill="url(#gold)"/>
  <text x="210" y="528" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#0D0D0D" text-anchor="middle">Télécharger Android</text>

  <!-- Right: Football icon -->
  <circle cx="950" cy="315" r="200" fill="none" stroke="#D4A017" stroke-width="2" opacity="0.2"/>
  <circle cx="950" cy="315" r="140" fill="none" stroke="#D4A017" stroke-width="3" opacity="0.3"/>
  <text x="950" y="370" font-family="Arial" font-size="160" text-anchor="middle" opacity="0.6">⚽</text>

  <!-- Stats -->
  <text x="820" y="530" font-family="Arial Black, sans-serif" font-size="14" fill="#D4A017" text-anchor="middle">9 pts/jour</text>
  <text x="950" y="530" font-family="Arial Black, sans-serif" font-size="14" fill="#4CAF50" text-anchor="middle">0,5 FCFA/pt</text>
  <text x="1080" y="530" font-family="Arial Black, sans-serif" font-size="14" fill="#D4A017" text-anchor="middle">Gratuit</text>

  <!-- Gold accent line bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#gold)"/>
</svg>
